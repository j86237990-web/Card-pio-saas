<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Master Pro - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        :root { --p: #f97316; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .font-burger { font-family: 'Archivo Black', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); }
        .shadow-3d { box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .card-3d { transition: all 0.3s ease; }
        .card-3d:hover { transform: translateY(-5px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .badge-open { background: #22c55e; color: white; }
        .badge-closed { background: #ef4444; color: white; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- VIEW CLIENTE -->
    <div id="view-cliente">
        <header class="relative h-[45vh] flex flex-col items-center justify-center text-center p-6 bg-slate-900 rounded-b-[3rem] overflow-hidden shadow-2xl">
            <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=800')] bg-cover bg-center"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/60 to-transparent"></div>
            
            <div class="relative z-10">
                <img id="cli-logo" class="w-28 h-28 rounded-3xl border-4 border-orange-500 shadow-2xl mx-auto mb-4 object-cover hidden">
                <h1 id="cli-nome" class="text-4xl font-burger uppercase italic text-white tracking-tighter">CARREGANDO...</h1>
                <div id="status-loja" class="mt-3 flex flex-col items-center gap-2">
                    <!-- Status Dinâmico -->
                </div>
                <button onclick="pedirSenhaAdmin()" class="mt-4 text-white/20 text-[10px] uppercase font-bold tracking-widest hover:text-orange-500 transition">Painel Admin</button>
            </div>
        </header>

        <nav id="nav-cats" class="sticky top-4 mx-4 mt-[-2rem] p-3 glass rounded-3xl flex gap-3 overflow-x-auto no-scrollbar z-50 shadow-xl border border-white/50"></nav>

        <main id="container-menu" class="max-w-2xl mx-auto p-4 space-y-12 mt-10 pb-44"></main>

        <!-- Carrinho Expandido -->
        <div id="carrinho" class="fixed bottom-6 left-4 right-4 max-w-md mx-auto bg-slate-900 text-white p-5 rounded-[2.5rem] shadow-3xl z-[60] transition-all transform scale-0">
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center px-2">
                    <div>
                        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Seu Pedido</p>
                        <h3 id="total-carrinho" class="text-3xl font-burger text-orange-500 italic">R$ 0,00</h3>
                    </div>
                    <button onclick="limparCarrinho()" class="text-slate-500 text-xs underline">Limpar</button>
                </div>
                <input type="text" id="end-entrega" placeholder="Seu Endereço Completo..." class="w-full p-4 bg-slate-800 rounded-2xl text-sm border border-slate-700 outline-none focus:border-orange-500">
                <button onclick="finalizarPedido()" class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black text-lg hover:bg-orange-600 transition shadow-lg shadow-orange-500/30">FECHAR PEDIDO NO WHATSAPP</button>
            </div>
        </div>
    </div>

    <!-- VIEW ADMIN -->
    <div id="view-admin" class="hidden min-h-screen flex flex-col md:flex-row bg-white">
        <aside class="w-full md:w-80 p-8 bg-slate-900 text-white flex flex-col gap-8 shadow-2xl">
            <h2 class="text-3xl font-burger italic text-orange-500">PAINEL MASTER</h2>
            <nav class="space-y-3">
                <button onclick="abaAdmin('loja')" class="w-full p-4 rounded-2xl bg-slate-800 hover:bg-orange-600 transition font-bold flex items-center gap-3"><i class="fas fa-cog"></i> Configurações</button>
                <button onclick="abaAdmin('produtos')" class="w-full p-4 rounded-2xl bg-slate-800 hover:bg-orange-600 transition font-bold flex items-center gap-3"><i class="fas fa-hamburger"></i> Meus Produtos</button>
                <button onclick="abaAdmin('pedidos')" class="w-full p-4 rounded-2xl bg-slate-800 hover:bg-orange-600 transition font-bold flex items-center gap-3"><i class="fas fa-receipt"></i> Pedidos Ativos</button>
                <a href="entregador.html" target="_blank" class="w-full p-4 rounded-2xl border border-orange-500/30 text-orange-500 font-bold flex items-center gap-3"><i class="fas fa-motorcycle"></i> Abrir Painel Entregador</a>
                <button onclick="location.reload()" class="w-full p-4 rounded-2xl text-red-400 font-bold flex items-center gap-3"><i class="fas fa-power-off"></i> Sair</button>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-12 overflow-y-auto bg-slate-50">
            <!-- ABA CONFIG -->
            <div id="admin-loja" class="animate-fadeIn max-w-4xl mx-auto">
                <h3 class="text-4xl font-black mb-8 text-slate-800">Setup do Estabelecimento</h3>
                <div class="grid md:grid-cols-2 gap-6 bg-white p-8 rounded-[2.5rem] shadow-3d border">
                    <div class="space-y-4">
                        <label class="font-bold text-slate-700">Logo do Trailer</label>
                        <div onclick="document.getElementById('in-logo').click()" class="w-32 h-32 rounded-3xl bg-slate-100 flex items-center justify-center border-4 border-dashed cursor-pointer overflow-hidden">
                            <img id="admin-view-logo" class="hidden w-full h-full object-cover">
                            <i id="admin-icon-logo" class="fas fa-camera text-slate-400 text-3xl"></i>
                        </div>
                        <input type="file" id="in-logo" class="hidden" onchange="uploadBase64(this, 'config/logo')">
                    </div>
                    <div class="space-y-4">
                        <label class="font-bold text-slate-700">Status da Loja</label>
                        <select id="in-status" class="w-full p-4 bg-slate-100 rounded-2xl font-bold">
                            <option value="aberto">🟢 ABERTO AGORA</option>
                            <option value="fechado">🔴 FECHADO NO MOMENTO</option>
                        </select>
                    </div>
                    <input type="text" id="in-nome" placeholder="Nome Comercial" class="p-4 bg-slate-100 rounded-2xl border-none">
                    <input type="number" id="in-zap" placeholder="WhatsApp (DDD+Número)" class="p-4 bg-slate-100 rounded-2xl border-none">
                    <input type="number" id="in-taxa" placeholder="Taxa Entrega R$" class="p-4 bg-slate-100 rounded-2xl border-none">
                    <input type="text" id="in-hora" placeholder="Horário (ex: 18:00 às 00:00)" class="p-4 bg-slate-100 rounded-2xl border-none">
                    <input type="text" id="in-end" placeholder="Endereço Completo do Trailer" class="p-4 bg-slate-100 rounded-2xl border-none md:col-span-2">
                    <button onclick="salvarConfigLoja()" class="md:col-span-2 bg-slate-900 text-white p-5 rounded-2xl font-black text-xl hover:bg-orange-500 transition shadow-xl">ATUALIZAR DADOS</button>
                </div>
            </div>

            <!-- ABA PRODUTOS -->
            <div id="admin-produtos" class="hidden">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="text-4xl font-black">Cardápio</h3>
                    <button onclick="modalProduto(true)" class="bg-orange-500 text-white px-10 py-5 rounded-2xl font-black shadow-lg shadow-orange-500/40 hover:scale-105 transition">+ NOVO LANCHE</button>
                </div>
                <div id="admin-grid-prods" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <!-- ABA PEDIDOS ATIVOS -->
            <div id="admin-pedidos" class="hidden">
                <h3 class="text-4xl font-black mb-8 text-slate-800">Gerenciar Entregas</h3>
                <div id="admin-lista-pedidos" class="grid gap-4">
                    <!-- Pedidos aparecem aqui -->
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL PRODUTO -->
    <div id="modal-prod" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl p-8 rounded-[3rem] shadow-2xl space-y-5 max-h-[90vh] overflow-y-auto">
            <h3 class="text-3xl font-black uppercase italic text-slate-800">Novo Produto</h3>
            <div onclick="document.getElementById('in-p-foto').click()" class="w-full h-48 bg-slate-100 rounded-3xl flex items-center justify-center border-4 border-dashed cursor-pointer overflow-hidden border-orange-500/20">
                <img id="view-p-foto" class="hidden w-full h-full object-cover">
                <span id="txt-p-foto" class="text-slate-400 font-bold">Foto do Produto</span>
            </div>
            <input type="file" id="in-p-foto" class="hidden" onchange="uploadBase64(this, 'temp_foto')">
            
            <div class="grid grid-cols-2 gap-4">
                <select id="in-p-cat" class="p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none">
                    <option>Hambúrgueres</option>
                    <option>Bebidas</option>
                    <option>Porções</option>
                    <option>Sobremesas</option>
                </select>
                <select id="in-p-dispo" class="p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none">
                    <option value="true">Disponível</option>
                    <option value="false">Esgotado</option>
                </select>
                <input type="text" id="in-p-nome" placeholder="Nome do Lanche" class="col-span-2 p-4 bg-slate-100 rounded-2xl border-none outline-none font-bold">
                <textarea id="in-p-desc" placeholder="Descrição completa e ingredientes..." class="col-span-2 p-4 bg-slate-100 rounded-2xl border-none outline-none h-24"></textarea>
                <input type="number" id="in-p-preco" placeholder="Preço Venda R$" class="p-4 bg-slate-100 rounded-2xl border-none font-bold text-orange-600">
                <input type="number" id="in-p-precoreal" placeholder="Preço S/ Desconto R$ (Opcional)" class="p-4 bg-slate-100 rounded-2xl border-none font-bold text-slate-400">
                <input type="text" id="in-p-tamanhos" placeholder="Tamanhos (ex: P, M, G)" class="col-span-2 p-4 bg-slate-100 rounded-2xl border-none">
            </div>
            <div class="flex gap-4 pt-4">
                <button onclick="modalProduto(false)" class="flex-1 p-5 bg-slate-200 rounded-2xl font-bold text-slate-600">Cancelar</button>
                <button onclick="cadastrarProduto()" class="flex-1 p-5 bg-orange-500 text-white rounded-2xl font-black text-lg shadow-xl">CADASTRAR NOVO</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyA97tk1YHbj_Zx0fgsdtLGIgqLRySx628o",
  authDomain: "hamburguer-traller.firebaseapp.com",
  databaseURL: "https://hamburguer-traller-default-rtdb.firebaseio.com",
  projectId: "hamburguer-traller",
  storageBucket: "hamburguer-traller.firebasestorage.app",
  messagingSenderId: "892971739544",
  appId: "1:892971739544:web:4817633fd9646b7141a3ed",
  measurementId: "G-9EL9TMPDLL"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let carrinho = [];
        let configLoja = { taxa: 0, status: 'aberto' };
        let tempFoto = "";

        function pedirSenhaAdmin() {
            if(prompt("Senha de Acesso:") === "1234") {
                document.getElementById('view-cliente').classList.add('hidden');
                document.getElementById('view-admin').classList.remove('hidden');
            }
        }

        function abaAdmin(aba) {
            ['admin-loja', 'admin-produtos', 'admin-pedidos'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(`admin-${aba}`).classList.remove('hidden');
        }

        function modalProduto(show) {
            document.getElementById('modal-prod').classList.toggle('hidden', !show);
        }

        function uploadBase64(input, path) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if(path === 'temp_foto') {
                    tempFoto = e.target.result;
                    document.getElementById('view-p-foto').src = tempFoto;
                    document.getElementById('view-p-foto').classList.remove('hidden');
                    document.getElementById('txt-p-foto').classList.add('hidden');
                } else {
                    db.ref(path).set(e.target.result);
                }
            };
            reader.readAsDataURL(input.files[0]);
        }

        function salvarConfigLoja() {
            db.ref('config/info').set({
                nome: document.getElementById('in-nome').value,
                zap: document.getElementById('in-zap').value,
                taxa: document.getElementById('in-taxa').value,
                horario: document.getElementById('in-hora').value,
                endereco: document.getElementById('in-end').value,
                status: document.getElementById('in-status').value
            }).then(() => alert("Dados Atualizados!"));
        }

        function cadastrarProduto() {
            const p = {
                categoria: document.getElementById('in-p-cat').value,
                disponivel: document.getElementById('in-p-dispo').value === "true",
                nome: document.getElementById('in-p-nome').value,
                desc: document.getElementById('in-p-desc').value,
                preco: document.getElementById('in-p-preco').value,
                precoOriginal: document.getElementById('in-p-precoreal').value,
                tamanhos: document.getElementById('in-p-tamanhos').value,
                foto: tempFoto
            };
            db.ref('produtos').push(p).then(() => {
                modalProduto(false);
                tempFoto = "";
                alert("Sucesso!");
            });
        }

        // SYNC REAL-TIME
        db.ref('config').on('value', snap => {
            const d = snap.val(); if(!d) return;
            configLoja = d.info;
            document.getElementById('cli-nome').innerText = d.info.nome;
            document.getElementById('in-nome').value = d.info.nome;
            document.getElementById('in-zap').value = d.info.zap;
            document.getElementById('in-taxa').value = d.info.taxa;
            document.getElementById('in-hora').value = d.info.horario;
            document.getElementById('in-end').value = d.info.endereco;
            document.getElementById('in-status').value = d.info.status;
            
            const badge = d.info.status === 'aberto' ? 
                `<span class="badge-open px-6 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter">Aberto • Entrega em 40min</span>
                 <p class="text-white/50 text-[10px] font-bold uppercase mt-1">${d.info.horario}</p>` :
                `<span class="badge-closed px-6 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter">Fechado no Momento</span>`;
            document.getElementById('status-loja').innerHTML = badge;

            if(d.logo) {
                document.getElementById('cli-logo').src = d.logo;
                document.getElementById('cli-logo').classList.remove('hidden');
                document.getElementById('admin-view-logo').src = d.logo;
                document.getElementById('admin-view-logo').classList.remove('hidden');
                document.getElementById('admin-icon-logo').classList.add('hidden');
            }
        });

        db.ref('produtos').on('value', snap => {
            const gridAdmin = document.getElementById('admin-grid-prods');
            const containerCli = document.getElementById('container-menu');
            const navCli = document.getElementById('nav-cats');
            
            gridAdmin.innerHTML = ""; containerCli.innerHTML = "";
            let produtos = [];
            snap.forEach(i => { produtos.push({key: i.key, ...i.val()}); });

            // Admin List
            produtos.forEach(p => {
                gridAdmin.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border ${p.disponivel ? 'border-slate-100' : 'opacity-50 grayscale border-red-200'}">
                        <img src="${p.foto}" class="w-full h-32 object-cover rounded-2xl mb-3 shadow-md">
                        <h4 class="font-bold text-orange-500 text-[10px] uppercase">${p.categoria}</h4>
                        <h3 class="font-black text-slate-800">${p.nome}</h3>
                        <p class="text-xs font-bold text-slate-400">R$ ${p.preco}</p>
                        <div class="flex gap-2 mt-4">
                            <button onclick="db.ref('produtos/${p.key}').remove()" class="text-red-500 text-xs font-bold">Excluir</button>
                            <button onclick="db.ref('produtos/${p.key}/disponivel').set(${!p.disponivel})" class="ml-auto text-slate-900 text-xs font-bold">${p.disponivel ? 'Pausar' : 'Ativar'}</button>
                        </div>
                    </div>`;
            });

            // Client Menu
            const cats = [...new Set(produtos.map(p => p.categoria))];
            navCli.innerHTML = cats.map(c => `<a href="#cat-${c}" class="bg-slate-900 text-white px-6 py-3 rounded-2xl text-[11px] font-black whitespace-nowrap uppercase tracking-widest">${c}</a>`).join('');
            
            containerCli.innerHTML = cats.map(c => `
                <section id="cat-${c}">
                    <h2 class="text-2xl font-burger italic uppercase mb-6 border-l-4 border-orange-500 pl-4">${c}</h2>
                    <div class="grid gap-6">
                        ${produtos.filter(p => p.categoria === c && p.disponivel).map(p => `
                            <div class="bg-white rounded-[2.5rem] p-4 shadow-3d card-3d border border-slate-100 flex flex-col">
                                <img src="${p.foto}" class="w-full h-48 object-cover rounded-[2rem] shadow-lg mb-4">
                                <div class="px-2">
                                    <h3 class="text-xl font-black uppercase text-slate-800 tracking-tighter">${p.nome}</h3>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="text-xl font-burger text-orange-500">R$ ${p.preco}</span>
                                        ${p.precoOriginal ? `<span class="text-xs line-through text-slate-300 font-bold">R$ ${p.precoOriginal}</span>` : ''}
                                    </div>
                                    <p class="text-slate-400 text-xs mt-2 h-8 overflow-hidden">${p.desc}</p>
                                    ${p.tamanhos ? `<div class="flex gap-2 mt-3">${p.tamanhos.split(',').map(t => `<span class="text-[9px] font-black px-2 py-1 bg-slate-100 rounded text-slate-500 uppercase">${t.trim()}</span>`).join('')}</div>` : ''}
                                    <button onclick="addToCart('${p.nome}', ${p.preco})" class="w-full mt-5 py-4 bg-slate-900 text-white rounded-2xl font-black text-sm hover:bg-orange-500 transition shadow-xl">ADICIONAR AO CARRINHO</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        });

        // SYNC PEDIDOS PARA O ADMIN
        db.ref('pedidos').on('value', snap => {
            const list = document.getElementById('admin-lista-pedidos');
            list.innerHTML = "";
            snap.forEach(i => {
                const ped = i.val();
                if(ped.status !== 'finalizado') {
                    list.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h4 class="font-black text-slate-800">CÓDIGO: <span class="text-orange-500">${ped.codigo}</span></h4>
                                <p class="text-xs font-bold text-slate-400 uppercase">${ped.itens}</p>
                                <p class="text-xs text-slate-500 font-medium italic mt-1">Destino: ${ped.enderecoCli}</p>
                            </div>
                            <div class="flex gap-2">
                                ${ped.status === 'pendente' ? 
                                    `<button onclick="db.ref('pedidos/${i.key}/status').set('em_rota')" class="bg-blue-500 text-white px-6 py-2 rounded-xl font-black text-xs">ENVIAR PARA ENTREGA</button>` :
                                    `<span class="bg-blue-100 text-blue-600 px-6 py-2 rounded-xl font-black text-xs uppercase italic">Em Rota de Entrega</span>`
                                }
                                <button onclick="db.ref('pedidos/${i.key}').remove()" class="bg-slate-100 text-red-500 px-6 py-2 rounded-xl font-black text-xs">CANCELAR</button>
                            </div>
                        </div>`;
                }
            });
        });

        function addToCart(n, p) {
            carrinho.push({n, p});
            renderCart();
        }

        function renderCart() {
            const sub = carrinho.reduce((a, b) => a + parseFloat(b.p), 0);
            const total = sub + parseFloat(configLoja.taxa || 0);
            document.getElementById('total-carrinho').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('carrinho').classList.remove('scale-0');
        }

        function limparCarrinho() {
            carrinho = [];
            document.getElementById('carrinho').classList.add('scale-0');
        }

        function finalizarPedido() {
            const endereco = document.getElementById('end-entrega').value;
            if(!endereco) return alert("Por favor, digite seu endereço!");
            
            const codigoSeguranca = Math.floor(1000 + Math.random() * 9000);
            const itensStr = carrinho.map(i => i.n).join(', ');
            const sub = carrinho.reduce((a, b) => a + parseFloat(b.p), 0);
            const total = sub + parseFloat(configLoja.taxa || 0);

            const novoPedido = {
                itens: itensStr,
                total: total.toFixed(2),
                enderecoCli: endereco,
                codigo: codigoSeguranca,
                status: 'pendente',
                timestamp: Date.now()
            };

            db.ref('pedidos').push(novoPedido).then(() => {
                let msg = `*🔥 NOVO PEDIDO - ${configLoja.nome.toUpperCase()} 🔥*\n\n`;
                msg += `🍔 *Lanches:* ${itensStr}\n`;
                msg += `📍 *Endereço:* ${endereco}\n`;
                msg += `💰 *Total c/ Taxa:* R$ ${total.toFixed(2)}\n\n`;
                msg += `⚠️ *SEU CÓDIGO DE ENTREGA:* ${codigoSeguranca}\n`;
                msg += `_(Informe este código ao entregador quando ele chegar!)_`;

                window.open(`https://wa.me/55${configLoja.zap}?text=${encodeURIComponent(msg)}`);
                limparCarrinho();
            });
        }
    </script>
</body>
</html>
